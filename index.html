<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuratec • Catálogo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --neura-primary: #4b5563; 
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #d1d5db;
            background-image: linear-gradient(135deg, #f3f4f6 0%, #d1d5db 50%, #9ca3af 100%);
            position: relative;
            overflow-x: hidden;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Efeito arco-íris/prisma simulando refração de luz do vidro */
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: 20%;
            width: 80vw; height: 80vh;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 60%);
            z-index: -3;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -10%; right: -5%;
            width: 60vw; height: 60vh;
            background: radial-gradient(circle, rgba(255, 230, 230, 0.4) 0%, rgba(230, 255, 255, 0.3) 30%, rgba(230, 230, 255, 0.4) 60%, transparent 80%);
            filter: blur(80px);
            z-index: -3;
            pointer-events: none;
        }
        
        /* Glassmorphism EXTREMO idêntico à imagem (aplicado a abas, painéis e cards) */
        .glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(30px) saturate(110%);
            -webkit-backdrop-filter: blur(30px) saturate(110%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 
                10px 15px 35px rgba(0, 0, 0, 0.07),
                inset 0 1px 2px rgba(255, 255, 255, 0.8),
                inset 0 -1px 2px rgba(255, 255, 255, 0.2);
        }
        
        .glass-tabs-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            border-left: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
            /* Esconde a barra de rolagem em celulares mas permite arrastar */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .glass-tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-active {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.4) 100%);
            color: #000000;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 1);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .tab-inactive {
            color: #4b5563;
            background: transparent;
            transition: all 0.3s ease;
        }
        .tab-inactive:hover { background: rgba(255, 255, 255, 0.2); }
        
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 15px 25px 50px rgba(0, 0, 0, 0.12), inset 0 1px 2px rgba(255, 255, 255, 1);
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
        }
        
        .product-image-container {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.03);
            position: relative;
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            position: relative;
            z-index: 1;
            /* Se as imagens tiverem fundo branco, isso mescla perfeitamente com o vidro */
            mix-blend-mode: multiply; 
        }
        
        .modal { animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.85) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .grey-header {
            background: linear-gradient(to right, #4b5563, #9ca3af);
            opacity: 0.9;
        }

        /* Formas de vidro decorativas no fundo flutuantes (Cenário) */
        .bg-glass-shape {
            position: fixed;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.2);
            border-top: 1px solid rgba(255,255,255,0.8);
            border-left: 1px solid rgba(255,255,255,0.8);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.05);
            z-index: -2;
            border-radius: 2rem;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-gray-800">
    
    <!-- FORMAS DE VIDRO DECORATIVAS NO FUNDO -->
    <div class="bg-glass-shape hidden md:block w-64 h-64 top-[5%] left-[-5%] rotate-12"></div>
    <div class="bg-glass-shape hidden md:block w-96 h-96 top-[40%] right-[-10%] -rotate-6 rounded-[4rem]"></div>
    <div class="bg-glass-shape w-48 h-48 md:w-72 md:h-40 bottom-[10%] left-[5%] md:left-[20%] rotate-3"></div>

    <!-- Header Cinza Superior -->
    <div class="grey-header h-2 w-full glass"></div>
    
    <div class="max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-8 relative z-10">
        <!-- Logo e Abas Responsivas -->
        <div class="flex flex-col lg:flex-row items-center justify-between gap-6">
            <!-- Logo -->
            <img src="file_000000004fc4622f8c5ec6ef85ccf0f3.png" 
                 alt="Neuratec Logo" 
                 class="h-10 md:h-14 w-auto object-contain filter drop-shadow-md">

            <!-- Sistema de Abas (Responsivo com scroll lateral no celular) -->
            <div class="flex overflow-x-auto w-full lg:w-auto glass-tabs-container rounded-3xl md:rounded-full p-2 whitespace-nowrap">
                <button onclick="switchTab(0)" id="tab-btn-0" class="tab-inactive px-6 md:px-8 py-3 rounded-full font-semibold text-xs md:text-sm flex items-center gap-2">Produtos Vendidos</button>
                <button onclick="switchTab(1)" id="tab-btn-1" class="tab-active px-6 md:px-8 py-3 rounded-full font-semibold text-xs md:text-sm flex items-center gap-2">Produtos</button>
                <button onclick="switchTab(2)" id="tab-btn-2" class="tab-inactive px-6 md:px-8 py-3 rounded-full font-semibold text-xs md:text-sm flex items-center gap-2">Produtos Pessoais</button>
            </div>
        </div>
    </div>

    <!-- Conteúdo das Abas -->
    <div class="max-w-7xl mx-auto px-4 md:px-8 pb-16 relative z-10">
        
        <!-- ABA PRODUTOS -->
        <div id="tab-content-1" class="tab-content">
            <!-- Catálogo de Produtos (Responsivo: 1 coluna no celular, 2 tablet, 3 PC) -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10" id="product-grid">
                <!-- Cards gerados via JS -->
            </div>

            <!-- GRÁFICO: Frequência de Vendas -->
            <div class="mt-14 glass rounded-[2.5rem] p-6 md:p-10">
                <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-8">
                    <h2 class="text-lg md:text-xl font-bold text-gray-800 flex flex-wrap items-center gap-3 tracking-tight">
                        Frequência de Vendas em Tempo Real
                        <span id="live-indicator" 
                              class="px-3 py-1.5 text-xs font-bold bg-white/50 border border-white/80 shadow-sm text-gray-800 rounded-full flex items-center gap-2 transition-all">
                            <span class="w-2 h-2 md:w-2.5 md:h-2.5 bg-gray-600 rounded-full animate-pulse"></span>
                            AO VIVO
                        </span>
                    </h2>
                    <div onclick="simulateSale()" 
                         class="cursor-pointer w-full md:w-auto text-center text-xs px-6 py-3 glass hover:bg-white/60 rounded-full flex items-center justify-center gap-2 text-gray-800 font-bold transition-all transform hover:-translate-y-1">
                        <span>Simular Nova Venda</span>
                    </div>
                </div>
                <div class="h-64 md:h-80 w-full relative">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Outras abas -->
        <div id="tab-content-0" class="tab-content hidden">
            <div class="glass rounded-[3rem] p-10 md:p-16 text-center">
                <p class="text-gray-700 font-medium text-xl md:text-2xl tracking-tight">📦 Produtos Vendidos em breve...</p>
            </div>
        </div>
        <div id="tab-content-2" class="tab-content hidden">
            <div class="glass rounded-[3rem] p-10 md:p-16 text-center">
                <p class="text-gray-700 font-medium text-xl md:text-2xl tracking-tight">👤 Produtos Pessoais em breve...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Estoque com integração backend -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-gray-900/30 backdrop-blur-md flex items-center justify-center z-50 transition-opacity p-4">
        <!-- Largura ajustada para responsividade -->
        <div class="modal glass max-w-lg w-full rounded-[2.5rem] p-6 md:p-10 relative">
            
            <div class="flex justify-between items-center mb-6 md:mb-8">
                <h3 class="text-xl md:text-2xl font-bold text-gray-900 tracking-tight" id="modal-product-title">Verificar Estoque</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full glass hover:bg-white/50 text-gray-700 text-2xl leading-none transition-all">×</button>
            </div>
            
            <div class="mb-6 md:mb-8">
                <label class="block text-xs md:text-sm font-semibold text-gray-700 mb-3 ml-1">Plataforma de Integração</label>
                <select id="platform-select" 
                        class="w-full glass bg-transparent appearance-none rounded-2xl px-4 md:px-6 py-4 text-xs md:text-sm font-medium focus:outline-none text-gray-800 cursor-pointer">
                    <option value="instagram">Instagram Shopping (Meta API)</option>
                    <option value="shopify">Shopify</option>
                    <option value="tiktok">TikTok Shop</option>
                    <option value="custom">API Personalizada (Website)</option>
                </select>
            </div>

            <div class="glass !bg-white/20 rounded-3xl p-6 md:p-8 text-center mb-6 md:mb-8">
                <p class="text-xs md:text-sm font-semibold text-gray-600 uppercase tracking-wider">Quantidade em estoque</p>
                <p id="modal-stock-qty" class="text-5xl md:text-7xl font-black text-gray-900 mt-2 md:mt-4 tracking-tighter drop-shadow-sm">247</p>
                <p class="text-[10px] md:text-xs font-medium text-gray-600 mt-3">unidades disponíveis • atualizado agora</p>
            </div>

            <button onclick="fetchStockFromBackend()" 
                    class="w-full glass !bg-white/40 hover:!bg-white/70 text-gray-900 py-4 md:py-5 rounded-2xl font-bold text-xs md:text-sm transition-all flex items-center justify-center gap-3">
                <span>Consultar Estoque na Plataforma</span>
                <span class="text-lg md:text-xl">↗</span>
            </button>
            
            <p id="modal-status" class="text-center text-[10px] md:text-xs text-gray-600 mt-5 font-bold tracking-wide">AGUARDANDO INTEGRAÇÃO...</p>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO DE PRODUTOS ====================
        // ERRO CORRIGIDO: O "Célula eletrônica" possuía uma aspas curva (“) que quebrava o script. Foi corrigido para aspas retas.
        const products = [
            { id: 1, title: "(Decoração) Dispositivo B1.0", price: "R$20.000,00", image: "Dispositivo inicial (visualização).png" },
            { id: 2, title: "Dispositivo B1.0", price: "R$20.000,00", image: "Dispositivo inicial (visualização).png" },
            { id: 3, title: "Célula eletrônica", price: "R$20.000,00", image: "produto-3.jpg" }
        ];

        // ==================== RENDERIZAÇÃO DOS CARDS ====================
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(product => {
                const cardHTML = `
                    <div class="product-card glass rounded-[2.5rem] p-2 flex flex-col h-full">
                        <div class="product-image-container p-2 m-2 flex-1 flex items-center justify-center relative bg-white/40">
                            <!-- Efeito de reflexo sobre a imagem -->
                            <div class="absolute inset-0 bg-gradient-to-br from-white/40 to-transparent z-10 pointer-events-none rounded-xl"></div>
                            
                            <!-- Imagem Real Carregada -->
                            <img src="${product.image}" alt="${product.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            
                            <!-- Fallback caso a imagem não exista na pasta -->
                            <span class="text-gray-500 font-semibold tracking-wider text-sm z-0 hidden absolute">SEM IMAGEM</span>
                        </div>
                        <div class="px-6 md:px-8 pb-8 pt-4">
                            <h3 class="font-bold text-lg md:text-xl mb-1 text-gray-900 tracking-tight leading-tight">${product.title}</h3>
                            <p class="text-xl md:text-2xl font-black text-gray-700 tracking-tighter">${product.price}</p>
                            <button onclick="checkStock(${product.id}, '${product.title}')" 
                                    class="mt-6 w-full glass !bg-white/50 hover:!bg-white/80 text-gray-900 py-3 md:py-4 rounded-2xl font-bold text-xs md:text-sm transition-all shadow-sm">
                                Verificar Estoque
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==================== GRÁFICO ====================
        let salesChart;
        let salesData = {
            labels: Array(12).fill(0).map((_, i) => `${i + 1}s`),
            values: [12, 19, 25, 18, 31, 27, 35, 42, 38, 45, 51, 48]
        };

        function createSalesChart() {
            const ctx = document.getElementById('salesChart');
            let gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.6)');   
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0.0)');

            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: salesData.labels,
                    datasets: [{
                        label: 'Vendas',
                        data: salesData.values,
                        borderColor: '#4b5563', 
                        backgroundColor: gradient,
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#4b5563',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255,255,255,0.4)', drawBorder: false },
                            ticks: { color: '#4b5563', font: { weight: 'bold' } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#4b5563', font: { weight: 'bold' } }
                        }
                    }
                }
            });
        }

        function startLiveSalesUpdate() {
            setInterval(() => {
                const newSale = Math.floor(Math.random() * 18) + 35;
                salesData.values.push(newSale);
                salesData.values.shift();
                salesData.labels.push((salesData.labels.length + 1) + 's');
                salesData.labels.shift();
                salesChart.update('none');
            }, 3000);
        }

        function simulateSale() {
            const newSale = Math.floor(Math.random() * 30) + 60;
            salesData.values.push(newSale);
            salesData.values.shift();
            salesData.labels.push((salesData.labels.length + 1) + 's');
            salesData.labels.shift();
            salesChart.update();
            
            const indicator = document.getElementById('live-indicator');
            indicator.classList.add('scale-110');
            setTimeout(() => { indicator.classList.remove('scale-110'); }, 300);
        }

        // ==================== SISTEMA DE ESTOQUE BACKEND ====================
        let currentStockData = { 1: 247, 2: 183, 3: 312 };

        function checkStock(id, title) {
            document.getElementById('modal-product-title').textContent = title;
            document.getElementById('modal-stock-qty').textContent = currentStockData[id] || '—';
            document.getElementById('modal-status').textContent = 'AGUARDANDO INTEGRAÇÃO...';
            document.getElementById('modal-status').className = "text-center text-[10px] md:text-xs text-gray-600 mt-5 font-bold tracking-wide";
            
            document.getElementById('stock-modal').classList.remove('hidden');
            document.getElementById('stock-modal').classList.add('flex');
        }

        async function fetchStockFromBackend() {
            const platform = document.getElementById('platform-select').value;
            const statusEl = document.getElementById('modal-status');
            
            statusEl.textContent = `CONSULTANDO API: ${platform.toUpperCase()}...`;
            statusEl.className = "text-center text-[10px] md:text-xs text-gray-800 mt-5 font-black tracking-wide animate-pulse";

            try {
                await new Promise(r => setTimeout(r, 1200));
                const stock = Math.floor(Math.random() * 80) + 180;
                
                document.getElementById('modal-stock-qty').textContent = stock;
                statusEl.textConte
