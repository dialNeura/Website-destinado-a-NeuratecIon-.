<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuratec • Catálogo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --neura-primary: #f97316;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            /* Gradiente + transparência aprimorada exatamente como o botão Neuratec */
            background: linear-gradient(135deg, 
                rgba(248, 250, 252, 0.92) 0%, 
                rgba(224, 242, 254, 0.85) 50%, 
                rgba(249, 115, 22, 0.06) 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Glassmorphism EXTREMAMENTE forte e transparente (inspirado 1:1 na imagem do botão Neuratec) */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                inset 0 -1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
        }
        
        .tab-active {
            background: rgba(255, 255, 255, 0.95);
            color: #1f2937;
            border-bottom: 3px solid #f97316;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.18);
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
        
        .product-image-container {
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }
        
        .modal {
            animation: modalPop 0.3s ease-out forwards;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .orange-header {
            background: linear-gradient(to right, #f97316, #fb923c);
        }

        /* Efeito extra de reflexo cristalino no fundo */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">
    <!-- Header Laranja + Logo (mantido 100% igual) -->
    <div class="orange-header h-3 w-full"></div>
    <div class="max-w-7xl mx-auto px-8 py-6">
        <div class="flex items-center justify-between">
            <!-- Logo (exato arquivo solicitado) -->
            <img src="file_000000004fc4622f8c5ec6ef85ccf0f3.png" 
                 alt="Neuratec Logo" 
                 class="h-12 w-auto object-contain">

            <!-- Sistema de Abas EXATAMENTE igual -->
            <div class="flex bg-white/70 glass rounded-3xl p-1.5 shadow-inner">
                <button onclick="switchTab(0)" id="tab-btn-0" class="tab-active px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos Vendidos</button>
                <button onclick="switchTab(1)" id="tab-btn-1" class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos</button>
                <button onclick="switchTab(2)" id="tab-btn-2" class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos Pessoais</button>
            </div>
        </div>
    </div>

    <!-- Conteúdo das Abas (mantido 100% igual) -->
    <div class="max-w-7xl mx-auto px-8 pb-12">
        
        <!-- ABA PRODUTOS (ativa por padrão) -->
        <div id="tab-content-1" class="tab-content">
            <!-- Catálogo de Produtos -->
            <div class="grid grid-cols-3 gap-8" id="product-grid">
                <!-- Cards gerados via JS -->
            </div>

            <!-- GRÁFICO APERFEIÇOADO: agora Frequência de Vendas em tempo real -->
            <div class="mt-12 glass rounded-3xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-3">
                        Frequência de Vendas em Tempo Real
                        <span id="live-indicator" 
                              class="px-3 py-1 text-xs font-medium bg-emerald-100 text-emerald-600 rounded-full flex items-center gap-1 animate-pulse">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                            AO VIVO
                        </span>
                    </h2>
                    <div onclick="simulateSale()" 
                         class="cursor-pointer text-xs px-5 py-2 bg-white/80 hover:bg-orange-50 border border-orange-200 rounded-2xl flex items-center gap-2 text-orange-600 font-medium">
                        <span>Simular Nova Venda</span>
                    </div>
                </div>
                <div class="h-80">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Outras abas (mantidas iguais) -->
        <div id="tab-content-0" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">📦 Produtos Vendidos em breve...</p>
            </div>
        </div>
        <div id="tab-content-2" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">👤 Produtos Pessoais em breve...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Estoque com integração backend (NOVO) -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl flex items-center justify-center z-50">
        <div class="modal glass max-w-lg w-full mx-4 rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold" id="modal-product-title">Verificar Estoque</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">×</button>
            </div>
            
            <!-- Seleção de Plataforma Externa -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-500 mb-2">Plataforma de Integração</label>
                <select id="platform-select" 
                        class="w-full glass border-0 rounded-2xl px-5 py-4 text-sm focus:outline-none">
                    <option value="instagram">Instagram Shopping (Meta Graph API)</option>
                    <option value="shopify">Shopify</option>
                    <option value="custom">API Personalizada (seu website)</option>
                </select>
            </div>

            <div class="bg-white/70 rounded-2xl p-6 text-center mb-6">
                <p class="text-sm text-gray-500">Quantidade em estoque</p>
                <p id="modal-stock-qty" class="text-6xl font-bold text-emerald-600 mt-2">247</p>
                <p class="text-xs text-emerald-500 mt-1">unidades disponíveis • atualizado agora</p>
            </div>

            <!-- Botão que chama o backend real -->
            <button onclick="fetchStockFromBackend()" 
                    class="w-full bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white py-4 rounded-2xl font-medium text-sm transition-all flex items-center justify-center gap-3 shadow-lg">
                <span>Consultar Estoque na Plataforma</span>
                <span class="text-lg">↗</span>
            </button>
            
            <p id="modal-status" class="text-center text-xs text-gray-400 mt-4">Aguardando integração...</p>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO DE PRODUTOS (mantida 100% igual) ====================
        const products = [
            { id: 1, title: "Aderir Título", price: "R$20.000,00", image: "produto-1.jpg" },
            { id: 2, title: "Aderir Título 2", price: "R$20.000,00", image: "produto-2.jpg" },
            { id: 3, title: "Aderir Título 3", price: "R$20.000,00", image: "produto-3.jpg" }
        ];

        // ==================== RENDERIZAÇÃO DOS CARDS (mantida 100% igual) ====================
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(product => {
                const cardHTML = `
                    <div class="product-card glass rounded-3xl overflow-hidden border border-white/50">
                        <div class="product-image-container p-6">
                            <img src="${product.image}" alt="${product.title}" class="w-full h-full object-cover rounded-2xl">
                        </div>
                        <div class="p-6">
                            <h3 class="font-medium text-lg mb-1">${product.title}</h3>
                            <p class="text-2xl font-semibold text-gray-800">${product.price}</p>
                            <button onclick="checkStock(${product.id}, '${product.title}')" 
                                    class="mt-6 w-full bg-white border border-gray-200 hover:border-orange-300 text-gray-700 py-3.5 rounded-2xl font-medium text-sm transition-all">
                                Verificar Estoque
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==================== GRÁFICO APERFEIÇOADO - Frequência de Vendas em Tempo Real ====================
        let salesChart;
        let salesData = {
            labels: Array(12).fill(0).map((_, i) => `${i + 1}s`),
            values: [12, 19, 25, 18, 31, 27, 35, 42, 38, 45, 51, 48]
        };

        function createSalesChart() {
            const ctx = document.getElementById('salesChart');
            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: salesData.labels,
                    datasets: [{
                        label: 'Vendas por minuto',
                        data: salesData.values,
                        borderColor: '#f97316',
                        backgroundColor: 'rgba(249, 115, 22, 0.15)',
                        borderWidth: 3,
                        tension: 0.4,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // Atualização automática a cada 3 segundos (simulação de vendas reais)
        function startLiveSalesUpdate() {
            setInterval(() => {
                // Adiciona nova venda aleatória
                const newSale = Math.floor(Math.random() * 18) + 35;
                salesData.values.push(newSale);
                salesData.values.shift();
                
                // Atualiza labels
                salesData.labels.push((salesData.labels.length + 1) + 's');
                salesData.labels.shift();
                
                salesChart.update('none');
            }, 3000);
        }

        function simulateSale() {
            const newSale = Math.floor(Math.random() * 25) + 55;
            salesData.values.push(newSale);
            salesData.values.shift();
            salesData.labels.push((salesData.labels.length + 1) + 's');
            salesData.labels.shift();
            salesChart.update();
            
            // Feedback visual
            const indicator = document.getElementById('live-indicator');
            indicator.style.backgroundColor = '#10b981';
            setTimeout(() => indicator.style.backgroundColor = '', 800);
        }

        // ==================== SISTEMA DE ESTOQUE COM BACKEND EXTERNO (NOVO) ====================
        let currentStockData = { 1: 247, 2: 183, 3: 312 };

        function checkStock(id, title) {
            document.getElementById('modal-product-title').textContent = title;
            document.getElementById('modal-stock-qty').textContent = currentStockData[id] || '—';
            document.getElementById('modal-status').textContent = 'Aguardando integração...';
            document.getElementById('stock-modal').classList.remove('hidden');
            document.getElementById('stock-modal').classList.add('flex');
        }

        async function fetchStockFromBackend() {
            const platform = document.getElementById('platform-select').value;
            const productId = document.getElementById('modal-product-title').textContent; // exemplo
            const statusEl = document.getElementById('modal-status');
            
            statusEl.textContent = `Consultando ${platform.toUpperCase()}...`;
            statusEl.classList.add('text-orange-500');

            try {
                // EXEMPLO REAL DE INTEGRAÇÃO - substitua pelas suas credenciais
                let url = '';
                if (platform === 'instagram') {
                    // Instagram Shopping via Meta Graph API (exemplo simplificado)
                    url = `https://graph.facebook.com/v19.0/INSTAGRAM_BUSINESS_ID/catalog?fields=inventory&access_token=SEU_ACCESS_TOKEN`;
                    // Em produção: use Meta SDK ou backend proxy
                } else if (platform === 'shopify') {
                    url = `https://SEU-LOJA.myshopify.com/admin/api/2025-01/products.json?ids=PRODUTO_ID`;
                } else {
                    url = `https://SEU-BACKEND-API.com/stock/${productId}`;
                }

                // Simulação de fetch real (descomente e ajuste para uso real)
                // const response = await fetch(url, { headers: { 'Authorization': 'Bearer ...' } });
                // const data = await response.json();
                // const stock = data.inventory || 247;

                // Simulação instantânea para demonstração
                await new Promise(r => setTimeout(r, 1100));
                const stock = Math.floor(Math.random() * 80) + 180;
                
                document.getElementById('modal-stock-qty').textContent = stock;
                statusEl.textContent = `✅ Estoque sincronizado com ${platform}`;
                statusEl.classList.remove('text-orange-500');
                statusEl.classList.add('text-emerald-500');
            } catch (e) {
                statusEl.textContent = '❌ Erro na integração. Verifique as credenciais.';
            }
        }

        function closeModal() {
            const modal = document.getElementById('stock-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ==================== SISTEMA DE ABAS (mantido 100% igual) ====================
        function switchTab(tabIndex) {
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById(`tab-btn-${i}`);
                btn.classList.toggle('tab-active', i === tabIndex);
            }
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-content-${tabIndex}`).classList.remove('hidden');
        }

        // ==================== INICIALIZAÇÃO (mantida + novas funções) ====================
        function init() {
            renderProducts();
            createSalesChart();
            startLiveSalesUpdate();
            switchTab(1);

            document.getElementById('stock-modal').addEventListener('click', e => {
                if (e.target.id === 'stock-modal') closeModal();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
