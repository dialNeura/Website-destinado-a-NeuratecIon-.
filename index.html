<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuratec • Catálogo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            /* Alterado de Laranja para Cinza/Prata escuro */
            --neura-primary: #4b5563; 
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            /* Gradiente aprimorado para refletir o vidro branco/prata da imagem */
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.95) 0%, 
                rgba(226, 232, 240, 0.85) 50%, 
                rgba(203, 213, 225, 0.4) 100%);
            position: relative;
            overflow-x: hidden;
            background-attachment: fixed;
        }
        
        /* Glassmorphism EXTREMAMENTE forte e transparente inspirado na imagem */
        .glass {
            background: rgba(255, 255, 255, 0.35); /* Mais transparente */
            backdrop-filter: blur(35px); /* Blur aumentado */
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.8); /* Borda mais branca simulando reflexo de luz */
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.05),
                inset 0 2px 0 rgba(255, 255, 255, 0.9),
                inset 0 -1px 0 rgba(255, 255, 255, 0.2);
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
        }
        
        .tab-active {
            background: rgba(255, 255, 255, 0.95);
            color: #111827;
            /* Borda e sombra cinzas em vez de laranja */
            border-bottom: 3px solid #4b5563;
            box-shadow: 0 4px 15px rgba(75, 85, 99, 0.15);
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
        
        .product-image-container {
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }
        
        .modal {
            animation: modalPop 0.3s ease-out forwards;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* Alterado de orange-header para grey-header */
        .grey-header {
            background: linear-gradient(to right, #4b5563, #9ca3af);
        }

        /* Efeito extra de reflexo cristalino no fundo simulando luz do vidro */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.7) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">
    <!-- Header Cinza + Logo -->
    <div class="grey-header h-3 w-full"></div>
    <div class="max-w-7xl mx-auto px-8 py-6">
        <div class="flex items-center justify-between">
            <!-- Logo -->
            <img src="file_000000004fc4622f8c5ec6ef85ccf0f3.png" 
                 alt="Neuratec Logo" 
                 class="h-12 w-auto object-contain">

            <!-- Sistema de Abas -->
            <div class="flex bg-white/40 glass rounded-3xl p-1.5 shadow-inner">
                <button onclick="switchTab(0)" id="tab-btn-0" class="tab-active px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos Vendidos</button>
                <button onclick="switchTab(1)" id="tab-btn-1" class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos</button>
                <button onclick="switchTab(2)" id="tab-btn-2" class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos Pessoais</button>
            </div>
        </div>
    </div>

    <!-- Conteúdo das Abas -->
    <div class="max-w-7xl mx-auto px-8 pb-12">
        
        <!-- ABA PRODUTOS (ativa por padrão) -->
        <div id="tab-content-1" class="tab-content">
            <!-- Catálogo de Produtos -->
            <div class="grid grid-cols-3 gap-8" id="product-grid">
                <!-- Cards gerados via JS -->
            </div>

            <!-- GRÁFICO: Frequência de Vendas em tempo real -->
            <div class="mt-12 glass rounded-3xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-3">
                        Frequência de Vendas em Tempo Real
                        <span id="live-indicator" 
                              class="px-3 py-1 text-xs font-medium bg-emerald-100 text-emerald-600 rounded-full flex items-center gap-1 animate-pulse">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                            AO VIVO
                        </span>
                    </h2>
                    <div onclick="simulateSale()" 
                         class="cursor-pointer text-xs px-5 py-2 bg-white/80 hover:bg-gray-100 border border-gray-300 rounded-2xl flex items-center gap-2 text-gray-700 font-medium transition-all">
                        <span>Simular Nova Venda</span>
                    </div>
                </div>
                <div class="h-80">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Outras abas -->
        <div id="tab-content-0" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">📦 Produtos Vendidos em breve...</p>
            </div>
        </div>
        <div id="tab-content-2" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">👤 Produtos Pessoais em breve...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Estoque com integração backend -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-xl flex items-center justify-center z-50">
        <div class="modal glass max-w-lg w-full mx-4 rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold text-gray-800" id="modal-product-title">Verificar Estoque</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-800 text-3xl leading-none transition-colors">×</button>
            </div>
            
            <!-- Seleção de Plataforma Externa (Adicionado TikTok Shop) -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-2">Plataforma de Integração</label>
                <select id="platform-select" 
                        class="w-full glass border-0 rounded-2xl px-5 py-4 text-sm focus:outline-none text-gray-700">
                    <option value="instagram">Instagram Shopping (Meta Graph API)</option>
                    <option value="shopify">Shopify</option>
                    <option value="tiktok">TikTok Shop</option>
                    <option value="custom">API Personalizada (Seu Website)</option>
                </select>
            </div>

            <div class="bg-white/60 rounded-2xl p-6 text-center mb-6 shadow-sm border border-white/50">
                <p class="text-sm text-gray-500">Quantidade em estoque</p>
                <p id="modal-stock-qty" class="text-6xl font-bold text-gray-800 mt-2">247</p>
                <p class="text-xs text-gray-500 mt-1">unidades disponíveis • atualizado agora</p>
            </div>

            <!-- Botão que chama o backend real (Cores Cinzas Aplicadas) -->
            <button onclick="fetchStockFromBackend()" 
                    class="w-full bg-gradient-to-r from-gray-600 to-gray-800 hover:from-gray-700 hover:to-gray-900 text-white py-4 rounded-2xl font-medium text-sm transition-all flex items-center justify-center gap-3 shadow-lg">
                <span>Consultar Estoque na Plataforma</span>
                <span class="text-lg">↗</span>
            </button>
            
            <p id="modal-status" class="text-center text-xs text-gray-500 mt-4 font-medium">Aguardando integração...</p>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO DE PRODUTOS ====================
        const products = [
            { id: 1, title: "(Decoração) Dispositivo B1.0", price: "R$20.000,00", image: "Dispositivo inicial (visualização).png" },
            { id: 2, title: "Dispositivo B1.0", price: "R$20.000,00", image: "Dispositivo inicial (visualização).png" },
            { id: 3, title: “Célula eletrônica", price: "R$20.000,00", image: "produto-3.jpg" }
        ];

        // ==================== RENDERIZAÇÃO DOS CARDS ====================
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(product => {
                const cardHTML = `
                    <div class="product-card glass rounded-3xl overflow-hidden border border-white/80">
                        <div class="product-image-container p-6 bg-white/40">
                            <!-- Placeholder de imagem de vidro caso a imagem não carregue -->
                            <div class="w-full h-full rounded-2xl bg-gradient-to-br from-gray-100 to-gray-200 shadow-inner flex items-center justify-center text-gray-400 text-xs">Imagem</div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-medium text-lg mb-1 text-gray-800">${product.title}</h3>
                            <p class="text-2xl font-semibold text-gray-900">${product.price}</p>
                            <button onclick="checkStock(${product.id}, '${product.title}')" 
                                    class="mt-6 w-full bg-white/80 backdrop-blur-md border border-gray-200 hover:border-gray-400 hover:bg-white text-gray-700 py-3.5 rounded-2xl font-medium text-sm transition-all shadow-sm">
                                Verificar Estoque
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==================== GRÁFICO - Frequência de Vendas (Cores Cinzas) ====================
        let salesChart;
        let salesData = {
            labels: Array(12).fill(0).map((_, i) => `${i + 1}s`),
            values: [12, 19, 25, 18, 31, 27, 35, 42, 38, 45, 51, 48]
        };

        function createSalesChart() {
            const ctx = document.getElementById('salesChart');
            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: salesData.labels,
                    datasets: [{
                        label: 'Vendas por minuto',
                        data: salesData.values,
                        borderColor: '#4b5563', // gray-600
                        backgroundColor: 'rgba(75, 85, 99, 0.15)', // Fundo cinza transparente
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#4b5563',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // Atualização automática a cada 3 segundos (simulação de vendas reais)
        function startLiveSalesUpdate() {
            setInterval(() => {
                const newSale = Math.floor(Math.random() * 18) + 35;
                salesData.values.push(newSale);
                salesData.values.shift();
                
                salesData.labels.push((salesData.labels.length + 1) + 's');
                salesData.labels.shift();
                
                salesChart.update('none');
            }, 3000);
        }

        function simulateSale() {
            const newSale = Math.floor(Math.random() * 25) + 55;
            salesData.values.push(newSale);
            salesData.values.shift();
            salesData.labels.push((salesData.labels.length + 1) + 's');
            salesData.labels.shift();
            salesChart.update();
            
            // Feedback visual do indicador (mantido verde pois sinaliza "conexão ativa/ao vivo")
            const indicator = document.getElementById('live-indicator');
            indicator.style.backgroundColor = '#10b981';
            indicator.style.color = '#fff';
            setTimeout(() => {
                indicator.style.backgroundColor = '';
                indicator.style.color = '';
            }, 800);
        }

        // ==================== SISTEMA DE ESTOQUE COM BACKEND EXTERNO ====================
        let currentStockData = { 1: 247, 2: 183, 3: 312 };

        function checkStock(id, title) {
            document.getElementById('modal-product-title').textContent = title;
            document.getElementById('modal-stock-qty').textContent = currentStockData[id] || '—';
            document.getElementById('modal-status').textContent = 'Aguardando integração...';
            document.getElementById('modal-status').className = "text-center text-xs text-gray-500 mt-4 font-medium";
            
            document.getElementById('stock-modal').classList.remove('hidden');
            document.getElementById('stock-modal').classList.add('flex');
        }

        async function fetchStockFromBackend() {
            const platform = document.getElementById('platform-select').value;
            const productId = document.getElementById('modal-product-title').textContent;
            const statusEl = document.getElementById('modal-status');
            
            statusEl.textContent = `Consultando API da plataforma: ${platform.toUpperCase()}...`;
            statusEl.className = "text-center text-xs text-gray-700 mt-4 font-bold animate-pulse";

            try {
                // ESTRUTURA REAL DE INTEGRAÇÃO DE APIS EXTERNAS
                let url = '';
                let fetchOptions = { method: 'GET', headers: {} };

                if (platform === 'instagram') {
                    // Instagram / Meta Graph API
                    url = `https://graph.facebook.com/v19.0/CATALOG_ID/products?filter={"name":"${productId}"}&fields=inventory&access_token=SEU_TOKEN`;
                } else if (platform === 'shopify') {
                    // Shopify Admin API
                    url = `https://SUA-LOJA.myshopify.com/admin/api/2024-01/products.json?title=${productId}`;
                    fetchOptions.headers['X-Shopify-Access-Token'] = 'SEU_TOKEN';
                } else if (platform === 'tiktok') {
                    // TikTok Shop Open API
                    url = `https://open-api.tiktokglobalshop.com/product/202309/products/stock?product_name=${productId}`;
                    fetchOptions.headers['x-tts-access-token'] = 'SEU_TOKEN';
                } else {
                    // Seu próprio Website/Banco de Dados
                    url = `https://sua-api.com/v1/stock?product=${productId}`;
                }

                /* 
                 * DESCOMENTE O CÓDIGO ABAIXO EM PRODUÇÃO
                 * const response = await fetch(url, fetchOptions);
                 * const data = await response.json();
                 * const realStock = extractStock(data, platform); 
                 */

                // Simulação de tempo de resposta da API (1.5 segundos)
                await new Promise(r => setTimeout(r, 1500));
                
                // Gerando um número de estoque para demonstração
                const stock = Math.floor(Math.random() * 80) + 180;
                
                document.getElementById('modal-stock-qty').textContent = stock;
                statusEl.textContent = `✅ Sincronizado com sucesso via ${platform.toUpperCase()}`;
                statusEl.className = "text-center text-xs text-emerald-600 mt-4 font-medium";
            } catch (e) {
                statusEl.textContent = '❌ Erro de conexão com a plataforma. Verifique API Keys.';
                statusEl.className = "text-center text-xs text-red-500 mt-4 font-medium";
            }
        }

        function closeModal() {
            const modal = document.getElementById('stock-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ==================== SISTEMA DE ABAS ====================
        function switchTab(tabIndex) {
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById(`tab-btn-${i}`);
                btn.classList.toggle('tab-active', i === tabIndex);
            }
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-content-${tabIndex}`).classList.remove('hidden');
        }

        // ==================== INICIALIZAÇÃO ====================
        function init() {
            renderProducts();
            createSalesChart();
            startLiveSalesUpdate();
            switchTab(1);

            document.getElementById('stock-modal').addEventListener('click', e => {
                if (e.target.id === 'stock-modal') closeModal();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
