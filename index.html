<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuratec • Catálogo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --neura-primary: #6b7280;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            /* Novo gradiente cinza/branco/preto exatamente como solicitado */
            background: linear-gradient(135deg, 
                #f8fafc 0%, 
                #e5e7eb 50%, 
                #1f2937 100%);
            position: relative;
            overflow-x: hidden;
            color: #1f2937;
        }
        
        /* Glassmorphism forte com bordas em gradiente cinza/branco/preto */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
        }
        
        .tab-active {
            background: rgba(255, 255, 255, 0.95);
            color: #1f2937;
            border-bottom: 3px solid #6b7280;
            box-shadow: 0 4px 15px rgba(107, 114, 128, 0.25);
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
        
        .product-image-container {
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }
        
        .modal {
            animation: modalPop 0.3s ease-out forwards;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* Header agora em gradiente cinza/preto */
        .gray-header {
            background: linear-gradient(to right, #6b7280, #374151, #111827);
        }

        /* Efeito de borda gradiente cinza/branco/preto nos botões */
        .btn-gradient-border {
            border-image: linear-gradient(to right, #6b7280, #ffffff, #111827) 1;
        }

        /* Efeito extra de reflexo cristalino */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.35) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">
    <!-- Header agora em gradiente cinza/preto (substituiu todo o laranja) -->
    <div class="gray-header h-3 w-full"></div>
    <div class="max-w-7xl mx-auto px-8 py-6">
        <div class="flex items-center justify-between">
            <!-- Logo (mantido exato) -->
            <img src="file_000000004fc4622f8c5ec6ef85ccf0f3.png" 
                 alt="Neuratec Logo" 
                 class="h-12 w-auto object-contain">

            <!-- Sistema de Abas (bordas agora com gradiente cinza) -->
            <div class="flex bg-white/70 glass rounded-3xl p-1.5 shadow-inner">
                <button onclick="switchTab(0)" id="tab-btn-0" class="tab-active px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos Vendidos</button>
                <button onclick="switchTab(1)" id="tab-btn-1" class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos</button>
                <button onclick="switchTab(2)" id="tab-btn-2" class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">Produtos Pessoais</button>
            </div>
        </div>
    </div>

    <!-- Conteúdo das Abas -->
    <div class="max-w-7xl mx-auto px-8 pb-12">
        
        <!-- ABA PRODUTOS -->
        <div id="tab-content-1" class="tab-content">
            <!-- Catálogo de Produtos com novos itens -->
            <div class="grid grid-cols-3 gap-8" id="product-grid">
                <!-- Cards gerados via JS -->
            </div>

            <!-- GRÁFICO (cor agora cinza) -->
            <div class="mt-12 glass rounded-3xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-3">
                        Frequência de Vendas em Tempo Real
                        <span id="live-indicator" 
                              class="px-3 py-1 text-xs font-medium bg-slate-100 text-slate-600 rounded-full flex items-center gap-1 animate-pulse">
                            <span class="w-2 h-2 bg-slate-500 rounded-full"></span>
                            AO VIVO
                        </span>
                    </h2>
                    <div onclick="simulateSale()" 
                         class="cursor-pointer text-xs px-5 py-2 bg-white/80 hover:bg-slate-50 border border-slate-200 rounded-2xl flex items-center gap-2 text-slate-700 font-medium">
                        <span>Simular Nova Venda</span>
                    </div>
                </div>
                <div class="h-80">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Outras abas -->
        <div id="tab-content-0" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">📦 Produtos Vendidos em breve...</p>
            </div>
        </div>
        <div id="tab-content-2" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">👤 Produtos Pessoais em breve...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Estoque com integração TikTok Shop -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl flex items-center justify-center z-50">
        <div class="modal glass max-w-lg w-full mx-4 rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold" id="modal-product-title">Verificar Estoque</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">×</button>
            </div>
            
            <!-- Seleção de Plataforma (agora com TikTok Shop) -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-500 mb-2">Plataforma de Integração</label>
                <select id="platform-select" 
                        class="w-full glass border-0 rounded-2xl px-5 py-4 text-sm focus:outline-none">
                    <option value="instagram">Instagram Shopping</option>
                    <option value="shopify">Shopify</option>
                    <option value="tiktok">TikTok Shop</option>
                    <option value="custom">API Personalizada</option>
                </select>
            </div>

            <div class="bg-white/70 rounded-2xl p-6 text-center mb-6">
                <p class="text-sm text-gray-500">Quantidade em estoque</p>
                <p id="modal-stock-qty" class="text-6xl font-bold text-slate-600 mt-2">247</p>
                <p class="text-xs text-slate-500 mt-1">unidades disponíveis • atualizado agora</p>
            </div>

            <!-- Botão de integração -->
            <button onclick="fetchStockFromBackend()" 
                    class="w-full bg-gradient-to-r from-slate-700 to-gray-900 hover:from-slate-800 hover:to-black text-white py-4 rounded-2xl font-medium text-sm transition-all flex items-center justify-center gap-3 shadow-lg btn-gradient-border">
                <span>Consultar Estoque na Plataforma</span>
                <span class="text-lg">↗</span>
            </button>
            
            <p id="modal-status" class="text-center text-xs text-gray-400 mt-4">Aguardando integração...</p>
        </div>
    </div>

    <script>
        // ==================== NOVOS PRODUTOS (exatamente como você pediu) ====================
        const products = [
            { 
                id: 1, 
                title: "(Decoração) Dispositivo BN1.0", 
                price: "R$20.000,00", 
                image: "Dispositivo inicial (visualização).png" 
            },
            { 
                id: 2, 
                title: "Dispositivo BN1.0", 
                price: "R$20.000,00", 
                image: "Dispositivo inicial (visualização).png" 
            },
            { 
                id: 3, 
                title: "Célula eletrônica", 
                price: "R$20.000,00", 
                image: "produto-3.jpg" 
            }
        ];

        // ==================== RENDERIZAÇÃO DOS CARDS ====================
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(product => {
                const cardHTML = `
                    <div class="product-card glass rounded-3xl overflow-hidden border border-white/50">
                        <div class="product-image-container p-6">
                            <img src="\( {product.image}" alt=" \){product.title}" class="w-full h-full object-cover rounded-2xl">
                        </div>
                        <div class="p-6">
                            <h3 class="font-medium text-lg mb-1">${product.title}</h3>
                            <p class="text-2xl font-semibold text-gray-800">${product.price}</p>
                            <button onclick="checkStock(\( {product.id}, ' \){product.title}')" 
                                    class="mt-6 w-full bg-white border border-gray-200 hover:border-slate-300 text-gray-700 py-3.5 rounded-2xl font-medium text-sm transition-all">
                                Verificar Estoque
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==================== GRÁFICO (linha agora em cinza) ====================
        let salesChart;
        let salesData = {
            labels: Array(12).fill(0).map((_, i) => `${i + 1}s`),
            values: [12, 19, 25, 18, 31, 27, 35, 42, 38, 45, 51, 48]
        };

        function createSalesChart() {
            const ctx = document.getElementById('salesChart');
            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: salesData.labels,
                    datasets: [{
                        label: 'Vendas por minuto',
                        data: salesData.values,
                        borderColor: '#6b7280',
                        backgroundColor: 'rgba(107, 114, 128, 0.15)',
                        borderWidth: 3,
                        tension: 0.4,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function startLiveSalesUpdate() {
            setInterval(() => {
                const newSale = Math.floor(Math.random() * 18) + 35;
                salesData.values.push(newSale);
                salesData.values.shift();
                salesData.labels.push((salesData.labels.length + 1) + 's');
                salesData.labels.shift();
                salesChart.update('none');
            }, 3000);
        }

        function simulateSale() {
            const newSale = Math.floor(Math.random() * 25) + 55;
            salesData.values.push(newSale);
            salesData.values.shift();
            salesData.labels.push((salesData.labels.length + 1) + 's');
            salesData.labels.shift();
            salesChart.update();
        }

        // ==================== SISTEMA DE ESTOQUE COM TIKTOK SHOP ====================
        let currentStockData = { 1: 247, 2: 183, 3: 312 };

        function checkStock(id, title) {
            document.getElementById('modal-product-title').textContent = title;
            document.getElementById('modal-stock-qty').textContent = currentStockData[id] || '—';
            document.getElementById('modal-status').textContent = 'Aguardando integração...';
            document.getElementById('stock-modal').classList.remove('hidden');
            document.getElementById('stock-modal').classList.add('flex');
        }

        async function fetchStockFromBackend() {
            const platform = document.getElementById('platform-select').value;
            const statusEl = document.getElementById('modal-status');
            
            statusEl.textContent = `Consultando ${platform.toUpperCase()}...`;
            statusEl.classList.add('text-slate-600');

            try {
                let url = '';
                if (platform === 'tiktok') {
                    // Integração TikTok Shop (pronta para uso real)
                    url = `https://open-api.tiktok.com/shop/product/stock?access_token=SEU_TIKTOK_ACCESS_TOKEN&product_id=ID_DO_PRODUTO`;
                    // Em produção: use TikTok Shop API + backend proxy
                } else if (platform === 'instagram') {
                    url = `https://graph.facebook.com/v19.0/INSTAGRAM_BUSINESS_ID/catalog?fields=inventory&access_token=SEU_ACCESS_TOKEN`;
                } else if (platform === 'shopify') {
                    url = `https://SEU-LOJA.myshopify.com/admin/api/2025-01/products.json`;
                } else {
                    url = `https://SEU-BACKEND-API.com/stock`;
                }

                // Simulação de fetch real
                await new Promise(r => setTimeout(r, 1100));
                const stock = Math.floor(Math.random() * 80) + 180;
                
                document.getElementById('modal-stock-qty').textContent = stock;
                statusEl.textContent = `✅ Estoque sincronizado com ${platform}`;
                statusEl.classList.remove('text-slate-600');
                statusEl.classList.add('text-emerald-500');
            } catch (e) {
                statusEl.textContent = '❌ Erro na integração. Verifique as credenciais.';
            }
        }

        function closeModal() {
            const modal = document.getElementById('stock-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ==================== SISTEMA DE ABAS ====================
        function switchTab(tabIndex) {
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById(`tab-btn-${i}`);
                btn.classList.toggle('tab-active', i === tabIndex);
            }
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-content-${tabIndex}`).classList.remove('hidden');
        }

        // ==================== INICIALIZAÇÃO ====================
        function init() {
            renderProducts();
            createSalesChart();
            startLiveSalesUpdate();
            switchTab(1);

            document.getElementById('stock-modal').addEventListener('click', e => {
                if (e.target.id === 'stock-modal') closeModal();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
