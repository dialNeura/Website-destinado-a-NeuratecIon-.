<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuratec • Catálogo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --neura-primary: #f97316;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
        }
        
        /* Glassmorphism inspirado no botão Neuratec transparente */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        
        .tab-active {
            background: white;
            color: #1f2937;
            border-bottom: 3px solid #f97316;
            box-shadow: 0 2px 10px rgba(249, 115, 22, 0.15);
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .product-image-container {
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }
        
        .modal {
            animation: modalPop 0.3s ease-out forwards;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .orange-header {
            background: linear-gradient(to right, #f97316, #fb923c);
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">
    <!-- Header Laranja + Logo -->
    <div class="orange-header h-3 w-full"></div>
    <div class="max-w-7xl mx-auto px-8 py-6">
        <div class="flex items-center justify-between">
            <!-- Logo Neuratec (arquivo exato que você pediu) -->
            <img src="file_000000004fc4622f8c5ec6ef85ccf0f3.png" 
                 alt="Neuratec Logo" 
                 class="h-12 w-auto object-contain">

            <!-- Sistema de Abas EXATAMENTE como na imagem -->
            <div class="flex bg-white/70 glass rounded-3xl p-1.5 shadow-inner">
                <button onclick="switchTab(0)" 
                        id="tab-btn-0"
                        class="tab-active px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">
                    Produtos Vendidos
                </button>
                <button onclick="switchTab(1)" 
                        id="tab-btn-1"
                        class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">
                    Produtos
                </button>
                <button onclick="switchTab(2)" 
                        id="tab-btn-2"
                        class="px-8 py-3 rounded-3xl font-medium text-sm transition-all flex items-center gap-2">
                    Produtos Pessoais
                </button>
            </div>
        </div>
    </div>

    <!-- Conteúdo das Abas -->
    <div class="max-w-7xl mx-auto px-8 pb-12">
        
        <!-- ABA PRODUTOS (ativa por padrão - conteúdo EXATO da imagem) -->
        <div id="tab-content-1" class="tab-content">
            <!-- Catálogo de Produtos - 3 cards alinhados lado a lado -->
            <div class="grid grid-cols-3 gap-8" id="product-grid">
                <!-- Cards serão gerados via JavaScript -->
            </div>

            <!-- Gráfico interativo EXATAMENTE no local da imagem -->
            <div class="mt-12 glass rounded-3xl p-8">
                <h2 class="text-lg font-semibold text-gray-700 mb-6 flex items-center gap-3">
                    Eficiência e Chance de Sucesso por Cenário
                    <span class="text-xs bg-orange-100 text-orange-600 px-3 py-1 rounded-full">Probabilidade</span>
                </h2>
                <div class="h-80">
                    <canvas id="successChart"></canvas>
                </div>
            </div>
        </div>

        <!-- ABA PRODUTOS VENDIDOS (placeholder) -->
        <div id="tab-content-0" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">📦 Produtos Vendidos em breve...</p>
            </div>
        </div>

        <!-- ABA PRODUTOS PESSOAIS (placeholder) -->
        <div id="tab-content-2" class="tab-content hidden">
            <div class="glass rounded-3xl p-12 text-center">
                <p class="text-gray-500 text-xl">👤 Produtos Pessoais em breve...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Estoque (sistema pronto para backend) -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
        <div class="modal glass max-w-md w-full mx-4 rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold" id="modal-product-title">Verificar Estoque</h3>
                <button onclick="closeModal()" 
                        class="text-gray-400 hover:text-gray-600 text-3xl leading-none">×</button>
            </div>
            <div class="space-y-6">
                <div class="bg-white/70 rounded-2xl p-6 text-center">
                    <p class="text-sm text-gray-500">Quantidade em estoque</p>
                    <p id="modal-stock-qty" class="text-5xl font-bold text-emerald-600 mt-2">247</p>
                    <p class="text-xs text-emerald-500 mt-1">unidades disponíveis</p>
                </div>
                <div onclick="alert('🔄 Atualizando estoque via backend... (substitua por fetch)')" 
                     class="cursor-pointer bg-orange-500 hover:bg-orange-600 text-white text-center py-4 rounded-2xl font-medium transition-colors">
                    Atualizar Estoque no Backend
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO DE PRODUTOS (EDITÁVEL AQUI) ====================
        // Títulos aparecem conforme inseridos na loja (Instagram ou website).
        // Basta editar o array abaixo ou conectar via API depois.
        const products = [
            {
                id: 1,
                title: "Aderir Título",
                price: "R$20.000,00",
                image: "produto-1.jpg"   // ← SUBSTITUA PELO NOME DO SEU ARQUIVO AQUI
            },
            {
                id: 2,
                title: "Aderir Título 2",
                price: "R$20.000,00",
                image: "produto-2.jpg"   // ← SUBSTITUA PELO NOME DO SEU ARQUIVO AQUI
            },
            {
                id: 3,
                title: "Aderir Título 3",
                price: "R$20.000,00",
                image: "produto-3.jpg"   // ← SUBSTITUA PELO NOME DO SEU ARQUIVO AQUI
            }
        ];

        // ==================== RENDERIZAÇÃO DOS CARDS ====================
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const cardHTML = `
                    <div class="product-card glass rounded-3xl overflow-hidden border border-white/50">
                        <!-- Caixa cinza claro EXATA da imagem -->
                        <div class="product-image-container p-6">
                            <img src="${product.image}" 
                                 alt="${product.title}"
                                 class="w-full h-full object-cover rounded-2xl">
                        </div>
                        <div class="p-6">
                            <h3 class="font-medium text-lg mb-1">${product.title}</h3>
                            <p class="text-2xl font-semibold text-gray-800">${product.price}</p>
                            
                            <!-- Botão Verificar Estoque -->
                            <button onclick="checkStock(\( {product.id}, ' \){product.title}')" 
                                    class="mt-6 w-full bg-white border border-gray-200 hover:border-orange-300 text-gray-700 py-3.5 rounded-2xl font-medium text-sm transition-all flex items-center justify-center gap-2">
                                Verificar Estoque
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==================== SISTEMA DE ESTOQUE (pronto para backend) ====================
        let currentStockData = {
            1: 247,
            2: 183,
            3: 312
        };

        function checkStock(id, title) {
            document.getElementById('modal-product-title').textContent = title;
            document.getElementById('modal-stock-qty').textContent = currentStockData[id] || '—';
            document.getElementById('stock-modal').classList.remove('hidden');
            document.getElementById('stock-modal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('stock-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ==================== SISTEMA DE ABAS ====================
        function switchTab(tabIndex) {
            // Remove active de todos os botões
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById(`tab-btn-${i}`);
                btn.classList.remove('tab-active');
            }
            // Ativa o clicado
            document.getElementById(`tab-btn-${tabIndex}`).classList.add('tab-active');
            
            // Esconde todos os conteúdos
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            // Mostra o conteúdo correto
            document.getElementById(`tab-content-${tabIndex}`).classList.remove('hidden');
        }

        // ==================== GRÁFICO INTERATIVO (Chart.js) ====================
        function createChart() {
            const ctx = document.getElementById('successChart');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Oferta', 'Realiza Compra', 'Persuasiva'],
                    datasets: [
                        {
                            label: 'Eficiência',
                            data: [0.88, 0.67, 0.42],
                            backgroundColor: '#3b82f6',
                            borderColor: '#1e40af',
                            borderWidth: 2,
                            borderRadius: 8,
                            barThickness: 45
                        },
                        {
                            label: 'Chance de Sucesso Média',
                            data: [0.94, 0.73, 0.38],
                            backgroundColor: '#ec4899',
                            borderColor: '#9f1239',
                            borderWidth: 2,
                            borderRadius: 8,
                            barThickness: 45
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'start',
                            labels: {
                                boxWidth: 12,
                                padding: 20,
                                font: { size: 13 },
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleFont: { size: 14 },
                            bodyFont: { size: 13 }
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 1,
                            ticks: {
                                stepSize: 0.2,
                                callback: value => value.toFixed(1)
                            },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // ==================== INICIALIZAÇÃO ====================
        function init() {
            // Tailwind script já carregado
            renderProducts();
            createChart();
            
            // Aba "Produtos" ativa por padrão
            switchTab(1);
            
            // Fechar modal ao clicar fora
            document.getElementById('stock-modal').addEventListener('click', function(e) {
                if (e.target.id === 'stock-modal') closeModal();
            });
        }

        // Inicia tudo
        window.onload = init;
    </script>
</body>
</html>
