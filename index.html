<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuratec • Catálogo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --neura-primary: #6b7280;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e5e7eb 50%, #1f2937 100%);
            position: relative;
            overflow-x: hidden;
            color: #1f2937;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.8), inset 0 -1px 0 rgba(0, 0, 0, 0.1);
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
        
        .product-image-container {
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }
        
        .modal {
            animation: modalPop 0.3s ease-out forwards;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .gray-header {
            background: linear-gradient(to right, #6b7280, #374151, #111827);
        }
        
        /* Menu Hamburger */
        .hamburger-menu {
            display: none;
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            min-width: 240px;
            z-index: 50;
        }
        
        .hamburger-menu a {
            display: block;
            padding: 16px 24px;
            font-weight: 500;
            color: #374151;
            transition: all 0.2s;
        }
        
        .hamburger-menu a:hover {
            background: #f1f5f9;
            color: #111827;
        }
        
        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 12px !important;
            }
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.35) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* Detalhe do produto */
        .detail-view {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">

    <!-- Header -->
    <div class="gray-header h-3 w-full"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-8 py-6">
        <div class="flex items-center gap-6">
            <!-- Menu + Logo (agora lado a lado à esquerda) -->
            <button onclick="toggleHamburger()" 
                    class="text-4xl text-gray-700 hover:text-gray-900 transition-colors focus:outline-none">
                ☰
            </button>
            <img src="file_000000004fc4622f8c5ec6ef85ccf0f3.png" 
                 alt="Neuratec Logo" 
                 class="h-12 w-auto object-contain">
        </div>
    </div>

    <!-- MENU HAMBURGER -->
    <div id="hamburger-menu" class="hamburger-menu hidden">
        <a href="#" onclick="showMainCatalog(); toggleHamburger()" class="border-b border-gray-100">Catálogo de Produtos</a>
        <a href="documentacao.html" onclick="toggleHamburger()">Documentação</a>
        <a href="catalogo-avancado.html" onclick="toggleHamburger()">Catálogo de Produtos (Avançado)</a>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-8 pb-12">
        
        <!-- CATÁLOGO PRINCIPAL -->
        <div id="main-catalog">
            <div class="product-grid grid grid-cols-3 gap-8" id="product-grid">
                <!-- Cards gerados via JS -->
            </div>

            <!-- Gráfico (mantido original) -->
            <div class="mt-12 glass rounded-3xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-3">
                        Frequência de Vendas em Tempo Real
                        <span id="live-indicator" class="px-3 py-1 text-xs font-medium bg-slate-100 text-slate-600 rounded-full flex items-center gap-1 animate-pulse">
                            <span class="w-2 h-2 bg-slate-500 rounded-full"></span>
                            AO VIVO
                        </span>
                    </h2>
                    <div onclick="simulateSale()" class="cursor-pointer text-xs px-5 py-2 bg-white/80 hover:bg-slate-50 border border-slate-200 rounded-2xl flex items-center gap-2 text-slate-700 font-medium">
                        Simular Nova Venda
                    </div>
                </div>
                <div class="h-80">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>

        <!-- TELA DE DETALHES DO PRODUTO -->
        <div id="product-detail" class="hidden">
            <button onclick="backToCatalog()" 
                    class="mb-8 flex items-center gap-3 text-gray-600 hover:text-gray-900 font-medium text-lg transition-colors">
                ← Voltar ao Catálogo
            </button>
            
            <div id="detail-content" class="detail-view glass rounded-3xl p-10 grid grid-cols-1 lg:grid-cols-2 gap-12">
                <!-- Preenchido dinamicamente pelo JavaScript -->
            </div>
        </div>
    </div>

    <!-- Modal de Estoque (100% funcional) -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl flex items-center justify-center z-50">
        <div class="modal glass max-w-lg w-full mx-4 rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold" id="modal-product-title">Verificar Estoque</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">×</button>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-500 mb-2">Plataforma de Integração</label>
                <select id="platform-select" class="w-full glass border-0 rounded-2xl px-5 py-4 text-sm focus:outline-none">
                    <option value="instagram">Instagram Shopping</option>
                    <option value="shopify">Shopify</option>
                    <option value="tiktok">TikTok Shop</option>
                    <option value="custom">API Personalizada</option>
                </select>
            </div>

            <div class="bg-white/70 rounded-2xl p-6 text-center mb-6">
                <p class="text-sm text-gray-500">Quantidade em estoque</p>
                <p id="modal-stock-qty" class="text-6xl font-bold text-slate-600 mt-2">247</p>
                <p class="text-xs text-slate-500 mt-1">unidades disponíveis • atualizado agora</p>
            </div>

            <button onclick="fetchStockFromBackend()" 
                    class="w-full bg-gradient-to-r from-slate-700 to-gray-900 hover:from-slate-800 hover:to-black text-white py-4 rounded-2xl font-medium text-sm transition-all flex items-center justify-center gap-3 shadow-lg">
                Consultar Estoque na Plataforma
                <span class="text-lg">↗</span>
            </button>
            
            <p id="modal-status" class="text-center text-xs text-gray-400 mt-4">Aguardando integração...</p>
        </div>
    </div>

    <script>
        // ==================== PRODUTOS (agora com detalhes completos) ====================
        const products = [
            { 
                id: 1, 
                title: "(Decoração) Dispositivo BN1.0", 
                price: "R$20.000,00", 
                image: "Dispositivo inicial (visualização).png",
                description: "Dispositivo inteligente de última geração para automação residencial e industrial.",
                features: ["Conexão 5G", "IA Embarcada", "Design Premium", "Integração total com Neuratec OS"]
            },
            { 
                id: 2, 
                title: "Dispositivo BN1.0", 
                price: "R$20.000,00", 
                image: "Dispositivo inicial (visualização).png",
                description: "Versão padrão do BN1.0 com foco em performance e durabilidade.",
                features: ["Alta performance", "Construção robusta", "Fácil instalação"]
            },
            { 
                id: 3, 
                title: "Célula eletrônica", 
                price: "R$20.000,00", 
                image: "produto-3.jpg",
                description: "Célula de processamento avançada para sistemas Neuratec.",
                features: ["Processamento quântico simulado", "Baixa latência", "Escalável"]
            }
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(product => {
                const cardHTML = `
                    <div onclick="showProductDetail(${product.id});" class="product-card glass rounded-3xl overflow-hidden border border-white/50 cursor-pointer">
                        <div class="product-image-container p-6">
                            <img src="\( {product.image}" alt=" \){product.title}" class="w-full h-full object-contain rounded-2xl">
                        </div>
                        <div class="p-6">
                            <h3 class="font-medium text-lg mb-1">${product.title}</h3>
                            <p class="text-2xl font-semibold text-gray-800">${product.price}</p>
                            <button onclick="event.stopImmediatePropagation(); checkStock(\( {product.id}, ' \){product.title}')" 
                                    class="mt-6 w-full bg-white border border-gray-200 hover:border-slate-300 text-gray-700 py-3.5 rounded-2xl font-medium text-sm transition-all">
                                Verificar Estoque
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ==================== DETALHES DO PRODUTO ====================
        function showProductDetail(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('main-catalog').classList.add('hidden');
            const detailDiv = document.getElementById('product-detail');
            detailDiv.classList.remove('hidden');

            let featuresList = product.features.map(f => `<li class="flex items-center gap-3">• ${f}</li>`).join('');

            document.getElementById('detail-content').innerHTML = `
                <div>
                    <img src="\( {product.image}" alt=" \){product.title}" class="w-full rounded-3xl shadow-2xl">
                </div>
                <div>
                    <h1 class="text-4xl font-bold">${product.title}</h1>
                    <p class="text-3xl font-semibold text-gray-800 mt-3">${product.price}</p>
                    
                    <p class="mt-8 text-lg text-gray-600">${product.description}</p>
                    
                    <div class="mt-10">
                        <h3 class="font-semibold text-lg mb-4">Destaques do Produto</h3>
                        <ul class="space-y-3">${featuresList}</ul>
                    </div>
                    
                    <button onclick="checkStock(\( {product.id}, ' \){product.title}')" 
                            class="mt-12 w-full bg-gradient-to-r from-slate-700 to-gray-900 text-white py-5 rounded-2xl font-medium text-lg transition-all">
                        Verificar Estoque em Tempo Real
                    </button>
                </div>
            `;
        }

        function backToCatalog() {
            document.getElementById('product-detail').classList.add('hidden');
            document.getElementById('main-catalog').classList.remove('hidden');
        }

        // ==================== GRÁFICO (mantido original) ====================
        let salesChart, salesData = { labels: Array(12).fill(0).map((_, i) => `${i + 1}s`), values: [12, 19, 25, 18, 31, 27, 35, 42, 38, 45, 51, 48] };

        function createSalesChart() {
            const ctx = document.getElementById('salesChart');
            salesChart = new Chart(ctx, {
                type: 'line',
                data: { labels: salesData.labels, datasets: [{ label: 'Vendas por minuto', data: salesData.values, borderColor: '#6b7280', backgroundColor: 'rgba(107, 114, 128, 0.15)', borderWidth: 3, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
            });
        }

        function startLiveSalesUpdate() {
            setInterval(() => {
                const newSale = Math.floor(Math.random() * 18) + 35;
                salesData.values.push(newSale); salesData.values.shift();
                salesData.labels.push((salesData.labels.length + 1) + 's'); salesData.labels.shift();
                if (salesChart) salesChart.update('none');
            }, 3000);
        }

        function simulateSale() {
            const newSale = Math.floor(Math.random() * 25) + 55;
            salesData.values.push(newSale); salesData.values.shift();
            salesData.labels.push((salesData.labels.length + 1) + 's'); salesData.labels.shift();
            if (salesChart) salesChart.update();
        }

        // ==================== ESTOQUE (mantido original) ====================
        let currentStockData = { 1: 247, 2: 183, 3: 312 };

        function checkStock(id, title) {
            document.getElementById('modal-product-title').textContent = title;
            document.getElementById('modal-stock-qty').textContent = currentStockData[id] || Math.floor(Math.random() * 150) + 180;
            document.getElementById('modal-status').textContent = 'Aguardando integração...';
            document.getElementById('stock-modal').classList.remove('hidden');
            document.getElementById('stock-modal').classList.add('flex');
        }

        async function fetchStockFromBackend() {
            const platform = document.getElementById('platform-select').value;
            const statusEl = document.getElementById('modal-status');
            statusEl.textContent = `Consultando ${platform.toUpperCase()}...`;
            await new Promise(r => setTimeout(r, 1100));
            const stock = Math.floor(Math.random() * 80) + 180;
            document.getElementById('modal-stock-qty').textContent = stock;
            statusEl.textContent = `✅ Estoque sincronizado com ${platform}`;
            statusEl.classList.add('text-emerald-500');
        }

        function closeModal() {
            const modal = document.getElementById('stock-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ==================== MENU ====================
        function toggleHamburger() {
            const menu = document.getElementById('hamburger-menu');
            menu.classList.toggle('hidden');
        }

        function showMainCatalog() {
            backToCatalog();
        }

        // Fechar menu ao clicar fora
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('hamburger-menu');
            const hamburger = document.querySelector('button[onclick="toggleHamburger()"]');
            if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });

        // ==================== INICIALIZAÇÃO ====================
        function init() {
            renderProducts();
            createSalesChart();
            startLiveSalesUpdate();
            // Fechar modal ao clicar fora
            document.getElementById('stock-modal').addEventListener('click', e => {
                if (e.target.id === 'stock-modal') closeModal();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
